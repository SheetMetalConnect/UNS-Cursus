# ==============================================================================
# Shelly Pro 3EM — Energy Monitor Bridge
# ==============================================================================
# Voorbeeld voor Shelly 3-fase energiemeters.
# Zelfde principe als de Tasmota bridge, maar ander JSON formaat.
#
# Shelly publiceert naar:
#   mijnbedrijf/{site}/{area}/{device}/status/em:0      → spanning, stroom, vermogen
#   mijnbedrijf/{site}/{area}/{device}/status/emdata:0   → totalen (kWh)
#
# Pas het locationMap aan naar jouw situatie.
# Vervang "mijnbedrijf" door je eigen enterprise naam.
# ==============================================================================

# --- MQTT Input (Bridge General tab) ---
# Protocol: MQTT
# Connection: tcp://<jouw-broker-ip>:1883
# Topics:
#   mijnbedrijf/+/+/+/status/em:0
#   mijnbedrijf/+/+/+/status/emdata:0

# --- Tag Processor: Defaults ---
defaults: |-
  if (typeof msg.payload === "string") {
    try { msg.payload = JSON.parse(msg.payload); } catch(e) {}
  }
  msg.meta.data_contract = "_raw";
  msg.meta.virtual_path = "energy";
  msg.meta.tag_name = "raw";

  var topic = msg.meta.mqtt_topic || "";
  var parts = topic.split("/");
  var area = parts[2] || "unknown";

  // Pas dit aan naar jouw locaties
  var locationMap = {
    "mijn-afdeling": "mijnbedrijf.mijnsite.mijnafdeling.mijnmachine",
  };
  msg.meta.location_path = locationMap[area] || ("mijnbedrijf." + area);

  msg.meta._area = area;
  msg.meta._component = parts[5] || "";
  return msg;

# --- Tag Processor: Advanced Processing ---
# Splitst 1 Shelly JSON bericht in losse tags per fase (a/b/c) + totalen.
# Gebruikt return [array] — zelfde patroon als de Tasmota bridge.
advancedProcessing: |-
  var p = msg.payload;
  var base = msg.meta.location_path;
  var component = msg.meta._component;
  var results = [];

  function tag(vpath, name, value) {
    if (value === null || value === undefined) return;
    results.push({
      payload: value,
      meta: { location_path: base, data_contract: "_raw", virtual_path: vpath, tag_name: name }
    });
  }

  // em:0 — realtime metingen per fase
  if (component === "em:0" && p) {
    var phases = ["a", "b", "c"];
    for (var i = 0; i < phases.length; i++) {
      var ph = phases[i];
      tag("energy", ph + "_voltage", p[ph + "_voltage"]);
      tag("energy", ph + "_current", p[ph + "_current"]);
      tag("energy", ph + "_power", p[ph + "_act_power"]);
      tag("energy", ph + "_apparent_power", p[ph + "_aprt_power"]);
      tag("energy", ph + "_power_factor", p[ph + "_pf"]);
      tag("energy", ph + "_frequency", p[ph + "_freq"]);
    }
    tag("energy", "total_current", p.total_current);
    tag("energy", "total_power", p.total_act_power);
    tag("energy", "total_apparent_power", p.total_aprt_power);
  }

  // emdata:0 — cumulatieve totalen (kWh)
  if (component === "emdata:0" && p) {
    var phases = ["a", "b", "c"];
    for (var i = 0; i < phases.length; i++) {
      var ph = phases[i];
      tag("totals", ph + "_energy_wh", p[ph + "_total_act_energy"]);
      tag("totals", ph + "_energy_returned_wh", p[ph + "_total_act_ret_energy"]);
    }
    tag("totals", "total_energy_wh", p.total_act);
    tag("totals", "total_energy_returned_wh", p.total_act_ret);
  }

  return results.length > 0 ? results : null;
