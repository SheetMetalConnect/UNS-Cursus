# ==============================================================================
# Cloud Simulator Bridge — External MQTT → UNS
# ==============================================================================
# Bridges metalfab simulator data from cloud broker into local UNS.
# Captures _raw sensor data for historian + _energy-monitor_v1 for energy flows.
#
# Remote broker: <cloud-broker>:1883 (no auth, HiveMQ CE)
# Simulator: Level 3 (ERP/MES), Eindhoven only
#
# Deploy: Management Console → Data Flows → Stand-alone → Add
#   Input field:  paste everything under "input:" (including "input:")
#   Pipeline field: paste everything under "pipeline:" (including "pipeline:")
#   Output field: paste everything under "output:" (including "output:")
# ==============================================================================

input:
  mqtt:
    auto_replay_nacks: false
    client_id: cloud_simulator_bridge
    dynamic_client_id_suffix: nanoid
    urls:
      - tcp://<cloud-broker>:1883
    topics:
      # _raw sensor data (all machines, all sites)
      - umh/v1/metalfab/+/+/+/_raw/#
      # _energy-monitor_v1 data contract
      - umh/v1/metalfab/+/+/+/_energy-monitor_v1/#

pipeline:
  processors:
    - bloblang: |
        let mqtt_topic = meta("mqtt_topic").or("")
        root = if $mqtt_topic == "" { deleted() } else { this }
        meta umh_topic = $mqtt_topic.replace("/", ".")

output:
  uns: {}
