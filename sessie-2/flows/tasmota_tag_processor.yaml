# ==============================================================================
# Tasmota Energy Monitor — Tag Processor
# ==============================================================================
# Plak in: Bridge → Read tab → Code mode AAN
#
# Tasmota devices publiceren 1 JSON bericht met alle sensordata.
# De advancedProcessing splitst dit op in losse tags via return [array].
# Conditions werken hier NIET — die zijn mutually exclusive (1 match per bericht).
#
# Bridge General tab:
#   Connection: <jouw-mqtt-broker-ip>:1883
#   Location: mijnbedrijf.mijnsite
#
# Bridge Read tab — MQTT topics:
#   tele/<enterprise>/<site>/tasmota/+/SENSOR
#
# Voorbeeld payload van Tasmota:
#   {"ANALOG":{"Temperature":29.7},"ENERGY":{"Power":125,"Voltage":231,"Current":1.2,...}}
#
# Dit wordt 3 losse UNS berichten:
#   umh.v1.mijnbedrijf.mijnsite.tasmota.desk._raw.temperature = 29.7
#   umh.v1.mijnbedrijf.mijnsite.tasmota.desk._raw.power = 125
#   umh.v1.mijnbedrijf.mijnsite.tasmota.desk._raw.voltage = 231
#
# Meer tags toevoegen? Voeg extra if-blokken toe in advancedProcessing:
#   if (data.ENERGY && data.ENERGY.Current !== undefined) {
#     messages.push({ payload: data.ENERGY.Current, meta: Object.assign({}, base_meta, { tag_name: "current" }) });
#   }
# ==============================================================================

defaults: |
  msg.meta.location_path = "{{ .location_path }}";
  msg.meta.data_contract = "_raw";
  msg.meta.tag_name = "raw";
  return msg;
advancedProcessing: |
  let topic_parts = (msg.meta["mqtt_topic"] || "").split("/");
  let device = topic_parts[4] || "unknown";
  let data = typeof msg.payload === "string" ? JSON.parse(msg.payload) : msg.payload;

  let base_meta = {
    location_path: msg.meta.location_path + ".tasmota." + device,
    data_contract: "_raw",
    timestamp_ms: Date.now().toString()
  };

  let messages = [];

  if (data.ANALOG && data.ANALOG.Temperature !== undefined) {
    messages.push({ payload: data.ANALOG.Temperature, meta: Object.assign({}, base_meta, { tag_name: "temperature" }) });
  }
  if (data.ENERGY && data.ENERGY.Power !== undefined) {
    messages.push({ payload: data.ENERGY.Power, meta: Object.assign({}, base_meta, { tag_name: "power" }) });
  }
  if (data.ENERGY && data.ENERGY.Voltage !== undefined) {
    messages.push({ payload: data.ENERGY.Voltage, meta: Object.assign({}, base_meta, { tag_name: "voltage" }) });
  }

  return messages;
