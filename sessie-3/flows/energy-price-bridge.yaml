# ============================================================
# energy-price-bridge (Standalone DataFlow)
# ============================================================

# ── INPUT ──────────────────────────────────────────────────
input:
  generate:
    interval: 60s
    mapping: root = ""

# ── PROCESSING ─────────────────────────────────────────────
pipeline:
  processors:
  - http:
      url: http://<CURSUS-SERVER>:8085/api/energy/current
      verb: GET
  - bloblang: "root = [\n  {\"tag\": \"price_eur_mwh\", \"v\": this.price_eur_mwh},\n\
      \  {\"tag\": \"price_eur_kwh\", \"v\": this.price_eur_kwh},\n  {\"tag\": \"\
      day_average_eur_mwh\", \"v\": this.day_average_eur_mwh},\n  {\"tag\": \"peak_price_eur_mwh\"\
      , \"v\": this.peak_price_eur_mwh},\n  {\"tag\": \"off_peak_price_eur_mwh\",\
      \ \"v\": this.off_peak_price_eur_mwh}\n]\n"
  - unarchive:
      format: json_array
  - bloblang: 'meta umh_topic = "umh.v1.smc.workshop.energy.spot_price._raw." + this.tag

      root.value = this.v

      root.timestamp_ms = now().ts_unix_milli()

      '

# ── OUTPUT ─────────────────────────────────────────────────
output:
  uns: {}
