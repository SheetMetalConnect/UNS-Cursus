# =============================================================================
# Weather Bridge — HTTP API Simulator → UNS (Standalone)
# =============================================================================
#
# Pollt elke 30 seconden een weer-API en publiceert 7 tags naar de UNS.
# Dit is een standalone flow omdat HTTP polling geen standaard Bridge protocol is.
#
# Deploy als:  Standalone flow in Management Console
#   1. Data Flows → Stand-alone → Add
#   2. Plak deze volledige YAML
#   3. Save & Deploy
#
# API:         http://95.217.14.139:8084/api/weather/current
# Locatie:     smc.workshop.weather
#
# Wat je ziet in de Topic Browser na deploy:
#   umh.v1.smc.workshop.weather._raw.temperature_c      (°C)
#   umh.v1.smc.workshop.weather._raw.humidity_pct        (%)
#   umh.v1.smc.workshop.weather._raw.wind_speed_kmh      (km/h)
#   umh.v1.smc.workshop.weather._raw.cloud_cover_pct     (%)
#   umh.v1.smc.workshop.weather._raw.solar_irradiance_wm2 (W/m²)
#   umh.v1.smc.workshop.weather._raw.pressure_hpa        (hPa)
#   umh.v1.smc.workshop.weather._raw.uv_index            (0-11)
# =============================================================================

input:
  generate:
    interval: 30s
    mapping: root = ""

pipeline:
  processors:
    # Stap 1: Haal weerdata op via HTTP GET
    - http:
        url: http://95.217.14.139:8084/api/weather/current
        verb: GET

    # Stap 2: Splits JSON-object in losse berichten per tag
    - bloblang: |
        let data = this
        root = [
          {"tag": "temperature_c",       "v": $data.temperature_c},
          {"tag": "humidity_pct",         "v": $data.humidity_pct},
          {"tag": "wind_speed_kmh",       "v": $data.wind_speed_kmh},
          {"tag": "cloud_cover_pct",      "v": $data.cloud_cover_pct},
          {"tag": "solar_irradiance_wm2", "v": $data.solar_irradiance_wm2},
          {"tag": "pressure_hpa",         "v": $data.pressure_hpa},
          {"tag": "uv_index",             "v": $data.uv_index}
        ]

    - unarchive:
        format: json_array

    # Stap 3: Zet UNS topic per tag
    - bloblang: |
        meta umh_topic = "umh.v1.smc.workshop.weather._raw." + this.tag
        root.value = this.v
        root.timestamp_ms = now().ts_unix_milli()

output:
  uns: {}
