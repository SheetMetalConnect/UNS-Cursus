# ============================================================
# mqtt-metalfab (Standalone DataFlow)
# ============================================================

# ── INPUT ──────────────────────────────────────────────────
input:
  mqtt:
    auto_replay_nacks: false
    client_id: mqtt_metalfab_bridge
    dynamic_client_id_suffix: nanoid
    topics:
    - umh/v1/metalfab/+/+/+/_raw/#
    urls:
    - tcp://<CURSUS-SERVER>:1883

# ── PROCESSING ─────────────────────────────────────────────
pipeline:
  processors:
  - bloblang: 'let mqtt_topic = meta("mqtt_topic").or("")

      root = if $mqtt_topic == "" { deleted() } else { this }

      meta umh_topic = $mqtt_topic.replace("/", ".")

      '

# ── OUTPUT ─────────────────────────────────────────────────
output:
  uns: {}
